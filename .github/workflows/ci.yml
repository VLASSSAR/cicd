name: Go CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare variables
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.image.outputs.image_name }}

    steps:
      - name: Prepare image name
        id: image
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

  check:
    name: Check code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Show Go version
        run: go version

      - name: Check formatting
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "These files must be formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Show coverage
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build app
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux go build -o bin/app ./cmd/app

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: bin/app
          retention-days: 7

  docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            -t "${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}" \
            -t "${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:latest" \
            .

      - name: Push Docker image with commit SHA tag
        run: |
          docker push "${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}"

      - name: Push Docker image with latest tag
        run: |
          docker push "${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:latest"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker-image

    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}:8080

    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key

          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            echo '${{ secrets.GHCR_TOKEN }}' |
              docker login \
                --username '${{ secrets.GHCR_USERNAME }}' \
                --password-stdin \
                '${{ env.REGISTRY }}' &&

            docker pull '${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}' &&

            docker rm -f simple-go-app 2>/dev/null || true &&

            docker run \
              --detach \
              --name simple-go-app \
              --restart unless-stopped \
              --publish 8080:8080 \
              '${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}'
          "